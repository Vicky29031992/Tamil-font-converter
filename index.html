<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Tamil Font Converter</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: Arial, sans-serif;
    background: #f4f0fa;
    color: #2e1a47;
  }

  .app-shell {
    width: 100vw;
    height: 100dvh;
    overflow: hidden;
  }

  .desktop-view,
  .mobile-view {
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  .desktop-view {
    display: none;
    padding: 10px;
    font-size: 12px;
    flex-direction: column;
    gap: 10px;
  }

  .desktop-view h2 {
    color: #4b0082;
    text-align: center;
    margin: 4px 0 0 0;
  }

  .desktop-view label,
  .desktop-view .font-label {
    font-weight: bold;
    font-size: 12px;
    color: #3d1265;
  }

  .desktop-view select {
    font-size: 11px;
    padding: 2px 4px;
    margin-left: 2px;
    cursor: pointer;
  }

  .desktop-view .container {
    display: flex;
    gap: 20px;
    margin-top: 0;
    flex: 1;
    min-height: 0;
  }

  .desktop-view .box {
    flex: 1;
    background: #fff;
    border: 2px solid #c7aef3;
    padding: 8px;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .desktop-view textarea {
    width: 100%;
    flex: 1;
    min-height: 0;
    margin-top: 8px;
    font-size: 12px;
    padding: 10px;
    border: 1px solid #b79ddb;
    border-radius: 4px;
    resize: none;
  }

  .desktop-view .copy-btn,
  .desktop-view .clear-btn {
    margin-top: 10px;
    align-self: flex-end;
    background: #6a0dad;
    color: white;
    border: none;
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 4px;
    cursor: pointer;
  }

  .desktop-view .copy-btn:hover,
  .desktop-view .clear-btn:hover {
    background: #5a0080;
  }

  .desktop-view .note {
    color: #4b0082;
    font-size: 12px;
    text-align: center;
    line-height: 1;
    margin: 0;
    padding: 0;
  }

  .desktop-view .font-size-group {
    display: flex;
    align-items: center;
  }

  .desktop-view .font-label {
    margin-right: 4px;
  }

  .desktop-view .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .desktop-view .encoding-select {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mobile-view {
    display: block;
    padding: 10px;
    font-size: 14px;
    flex-direction: column;
    gap: 10px;
  }

  .mobile-view h2 {
    color: #4b0082;
    text-align: center;
    margin: 4px 0 4px 0;
    font-size: 20px;
    line-height: 1.1;
    flex: 0 0 auto;
  }

  .mobile-view label,
  .mobile-view .font-label {
    font-weight: bold;
    font-size: 13px;
    color: #3d1265;
  }

  .mobile-view select {
    font-size: 13px;
    padding: 5px 8px;
    margin-left: 4px;
    cursor: pointer;
    border-radius: 4px;
    border: 1px solid #b79ddb;
  }

  .mobile-view .views-stack {
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    min-height: 0;
  }

  .mobile-view .box {
    background: #fff;
    border: 2px solid #c7aef3;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    min-height: 0;
    flex: 1;
  }

  .mobile-view .label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mobile-view .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 8px;
    margin-bottom: 8px;
  }

  .mobile-view .encoding-select {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .mobile-view .font-size-group {
    display: flex;
    align-items: center;
  }

  .mobile-view textarea {
    width: 100%;
    flex: 1;
    min-height: 0;
    font-size: 14px;
    padding: 10px;
    border: 1px solid #b79ddb;
    border-radius: 4px;
    resize: none;
  }

  .mobile-view .copy-btn,
  .mobile-view .clear-btn {
    margin-top: 10px;
    align-self: flex-end;
    background: #6a0dad;
    color: white;
    border: none;
    padding: 8px 16px;
    font-size: 13px;
    border-radius: 4px;
    cursor: pointer;
  }

  .mobile-view .copy-btn:hover,
  .mobile-view .clear-btn:hover {
    background: #5a0080;
  }

  .mobile-view .note {
    color: #4b0082;
    font-size: 13px;
    text-align: center;
    line-height: 1.1;
    margin: 0;
    padding: 6px 0;
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 24px;
  }

  @media (orientation: landscape) {
    .desktop-view { display: flex; }
    .mobile-view { display: none; }
  }

  @media (orientation: portrait) {
    .desktop-view { display: none; }
    .mobile-view { display: flex; }
  }

  @media (max-width: 768px) {
    .mobile-view {
      padding: 8px;
    }

    .mobile-view h2 {
      font-size: 18px;
      margin: 2px 0 4px 0;
    }

    .mobile-view .top-row {
      flex-wrap: wrap;
    }

    .mobile-view .encoding-select,
    .mobile-view .font-size-group {
      flex: 1;
    }

    .mobile-view .copy-btn,
    .mobile-view .clear-btn {
      width: 100%;
      align-self: center;
      padding: 10px 20px;
    }
  }

  @media (max-width: 480px) {
    .mobile-view {
      padding: 6px;
      gap: 6px;
    }

    .mobile-view .views-stack {
      gap: 8px;
    }

    .mobile-view .note {
      padding: 4px 0;
      min-height: 22px;
    }

    .mobile-view select {
      font-size: 12px;
      padding: 4px 6px;
    }

    .mobile-view .font-label {
      font-size: 12px;
    }
  }
</style>
</head>
<body>

      <div class="box">
        <div class="label-row">

              <option value="25">25</option>
              <option value="26">26</option>
              <option value="27">27</option>
              <option value="28">28</option>
              <option value="29">29</option>
              <option value="30">30</option>
            </select>
          </div>
        </div>
        <textarea id="input-text"></textarea>
        <button class="clear-btn" onclick="clearInputText()">Clear Text</button>

      <div class="box">
        <div class="label-row">
          <label for="output-text">Converted Text:</label>
          <div class="encoding-select">
            <span class="font-label">Encoding:</span>
            <select id="output-encoding"></select>
          </div>
          <div class="font-size-group">
            <span class="font-label">Font size:</span>
            <select id="font-size-output">
              <option value="15">15</option>
              <option value="16">16</option>
              <option value="17" selected>17</option>
              <option value="18">18</option>
              <option value="19">19</option>
              <option value="20">20</option>
              <option value="21">21</option>
              <option value="22">22</option>
              <option value="23">23</option>
              <option value="24">24</option>
              <option value="25">25</option>
              <option value="26">26</option>

    <div class="views-stack">
      <div class="box">
        <div class="label-row">
          <label for="input-text">Input Text:</label>
        </div>
        <div class="top-row">
          <div class="encoding-select">
            <span class="font-label">Encoding:</span>

          </div>
          <div class="font-size-group">
            <span class="font-label">Font size:</span>
            <select id="font-size-input-mobile">
              <option value="15" selected>15</option>
              <option value="16">16</option>
              <option value="17">17</option>
              <option value="18">18</option>

              <option value="20">20</option>

              <option value="22">22</option>

            <select id="output-encoding-mobile"></select>
          </div>
          <div class="font-size-group">
            <span class="font-label">Font size:</span>

              <option value="15" selected>15</option>
              <option value="16">16</option>
              <option value="17">17</option>

<script src="mappings/bamini_to_unicode.js"></script>
<script src="mappings/vanavil_to_unicode.js"></script>
<script src="mappings/sathayam_to_unicode.js"></script>
<script src="mappings/anankuhelv_to_unicode.js"></script>

<script>
const fonts = [
  { id: 'unicode', name: 'Unicode', fontFile: 'Arial Unicode MS' },
  { id: 'bamini', name: 'Bamini', fontFile: 'Bamini' },
  { id: 'vanavil', name: 'Vanavil', fontFile: 'VANAVIL-Avvaiyar' },
  { id: 'sathayam', name: 'Sathayam', fontFile: 'SATHAYAM' },
  { id: 'anankuhelv', name: 'Ananku Helv', fontFile: 'Ananku Helv' }
];

const baseMappings = {
  bamini: typeof bamini_to_unicode !== 'undefined' ? bamini_to_unicode : null,
  vanavil: typeof vanavil_to_unicode !== 'undefined' ? vanavil_to_unicode : null,
  sathayam: typeof sathayam_to_unicode !== 'undefined' ? sathayam_to_unicode : null,
  anankuhelv: typeof anankuhelv_to_unicode !== 'undefined' ? anankuhelv_to_unicode : null
};

let mappings = {};

function currentIds() {
  const mobile = window.matchMedia('(orientation: portrait)').matches;
  return mobile ? {
    inputText: 'input-text-mobile',
    outputText: 'output-text-mobile',
    inputEncoding: 'input-encoding-mobile',
    outputEncoding: 'output-encoding-mobile',
    fontSizeInput: 'font-size-input-mobile',
    fontSizeOutput: 'font-size-output-mobile'
  } : {
    inputText: 'input-text',
    outputText: 'output-text',
    inputEncoding: 'input-encoding',
    outputEncoding: 'output-encoding',
    fontSizeInput: 'font-size-input',
    fontSizeOutput: 'font-size-output'
  };
}

function generateFontStyles() {
  let styleContent = '';
  // Create a strict sub-range rule mapping only Tamil character blocks to Arial Unicode
  styleContent += `
@font-face {
  font-family: 'ForcedTamilUnicode';
  src: url('font/Tamil Sangam MN.ttf') format('truetype');
  unicode-range: U+0B80-0BFF;
  font-weight: normal;
  font-style: normal;
}

textarea {
  font-family: 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;

  fonts.forEach(font => {
    const fontName = font.fontFile + 'Font';
    
    if (font.id !== 'unicode') {
      styleContent += `
@font-face {
  font-family: '${fontName}';
  src: url('font/${font.fontFile}.ttf') format('truetype'),
       url('font/${font.fontFile}.woff') format('woff'),
       url('font/${font.fontFile}.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
`;
    }
    
    if (font.id === 'unicode') {
      styleContent += `
.font-unicode {
  font-family: 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;
    } else {
      styleContent += `
.font-${font.id} {
  font-family: '${fontName}', 'ForcedTamilUnicode', 'Tamil Sangam MN', Arial, sans-serif !important;
}
`;
    }
  });
  const styleTag = document.createElement('style');
  styleTag.textContent = styleContent;
  document.head.appendChild(styleTag);
}

function fillSelect(select) {
  select.innerHTML = '';
  fonts.forEach(font => {
    const option = document.createElement('option');
    option.value = font.id;
    option.textContent = font.name;
    select.appendChild(option);
  });
}

function populateEncodingSelects() {
  [
    'input-encoding', 'output-encoding',
    'input-encoding-mobile', 'output-encoding-mobile'
  ].forEach(id => {
    const el = document.getElementById(id);
    if (el) fillSelect(el);
  });
}

function flipMapping(mapping) {
  const flipped = {};
  if (!mapping) return flipped;
  for (const [key, value] of Object.entries(mapping)) {
    if (!flipped[value]) {
      flipped[value] = key;
    }
  }
  return flipped;
}

function chainMapping(map1, map2) {
  const chained = {};
  if (!map1 || !map2) return chained;
  for (const [key, value] of Object.entries(map1)) {
    if (Object.prototype.hasOwnProperty.call(map2, value)) {
      chained[key] = map2[value];
    }
  }
  return chained;
}

function createPattern(mapping) {
  const keys = Object.keys(mapping).sort((a, b) => b.length - a.length);
  if (keys.length === 0) return null;
  const escapedKeys = keys.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  return new RegExp(escapedKeys.join('|'), 'g');
}

function buildAllMappings() {
  mappings = {};
  const available = {};
  Object.keys(baseMappings).forEach(id => {
    if (baseMappings[id]) available[id] = baseMappings[id];
  });
  const ids = Object.keys(available);
  ids.forEach(from => {
    mappings[`${from}_to_unicode`] = available[from];
    mappings[`unicode_to_${from}`] = flipMapping(available[from]);
  });
  for (let i = 0; i < ids.length; i++) {
    for (let j = 0; j < ids.length; j++) {
      if (i === j) continue;
      const from = ids[i];
      const to = ids[j];
      const key = `${from}_to_${to}`;
      if (available[from] && available[to]) {
        mappings[key] = chainMapping(available[from], flipMapping(available[to]));
      }
    }
  }
}

function syncState(source) {
  const targets = [
    {
      inputText: document.getElementById('input-text'),
      outputText: document.getElementById('output-text'),
      inputEncoding: document.getElementById('input-encoding'),
      outputEncoding: document.getElementById('output-encoding'),
      fontSizeInput: document.getElementById('font-size-input'),
      fontSizeOutput: document.getElementById('font-size-output')
    },
    {
      inputText: document.getElementById('input-text-mobile'),
      outputText: document.getElementById('output-text-mobile'),
      inputEncoding: document.getElementById('input-encoding-mobile'),
      outputEncoding: document.getElementById('output-encoding-mobile'),
      fontSizeInput: document.getElementById('font-size-input-mobile'),
      fontSizeOutput: document.getElementById('font-size-output-mobile')
    }
  ];

  targets.forEach(t => {
    if (t.inputText !== source.inputText) t.inputText.value = source.inputText.value;
    if (t.outputText !== source.outputText) t.outputText.value = source.outputText.value;
    if (t.inputEncoding !== source.inputEncoding) t.inputEncoding.value = source.inputEncoding.value;
    if (t.outputEncoding !== source.outputEncoding) t.outputEncoding.value = source.outputEncoding.value;
    if (t.fontSizeInput !== source.fontSizeInput) t.fontSizeInput.value = source.fontSizeInput.value;
    if (t.fontSizeOutput !== source.fontSizeOutput) t.fontSizeOutput.value = source.fontSizeOutput.value;
    t.inputText.style.fontSize = t.fontSizeInput.value + 'px';
    t.outputText.style.fontSize = t.fontSizeOutput.value + 'px';
    fonts.forEach(font => {
      t.inputText.classList.remove(`font-${font.id}`);
      t.outputText.classList.remove(`font-${font.id}`);
    });
    t.inputText.classList.add(`font-${t.inputEncoding.value}`);
    t.outputText.classList.add(`font-${t.outputEncoding.value}`);
  });
}

function getCurrentSet() {
  const ids = currentIds();
  return {
    inputText: document.getElementById(ids.inputText),
    outputText: document.getElementById(ids.outputText),
    inputEncoding: document.getElementById(ids.inputEncoding),
    outputEncoding: document.getElementById(ids.outputEncoding),
    fontSizeInput: document.getElementById(ids.fontSizeInput),
    fontSizeOutput: document.getElementById(ids.fontSizeOutput)
  };
}

function doFontConversion() {
  const ui = getCurrentSet();
  const inputText = ui.inputText.value;
  const inputEncoding = ui.inputEncoding.value;
  const outputEncoding = ui.outputEncoding.value;

  if (inputEncoding === outputEncoding) {
    ui.outputText.value = inputText;
    syncState(ui);
    return;
  }

  const mapping = mappings[`${inputEncoding}_to_${outputEncoding}`];
  if (!mapping || Object.keys(mapping).length === 0) {
    ui.outputText.value = inputText;
    syncState(ui);
    return;
  }

  const pattern = createPattern(mapping);
  if (!pattern) {
    ui.outputText.value = inputText;
    syncState(ui);
    return;
  }

  ui.outputText.value = inputText.replace(pattern, match => mapping[match] || match);
  syncState(ui);
}

function updateInputFont() {
  const ui = getCurrentSet();
  fonts.forEach(font => ui.inputText.classList.remove(`font-${font.id}`));
  ui.inputText.classList.add(`font-${ui.inputEncoding.value}`);
  doFontConversion();
}

function updateOutputFont() {
  const ui = getCurrentSet();
  fonts.forEach(font => ui.outputText.classList.remove(`font-${font.id}`));
  ui.outputText.classList.add(`font-${ui.outputEncoding.value}`);
  doFontConversion();
}

function copyConverted() {
  const ui = getCurrentSet();
  ui.outputText.select();
  ui.outputText.setSelectionRange(0, ui.outputText.value.length);
  document.execCommand('copy');
  alert('Converted text copied!');
}

function clearInputText() {
  const ui = getCurrentSet();
  ui.inputText.value = '';
  ui.outputText.value = '';
  syncState(ui);
}

function attachEvents(prefix = '') {
  const suffix = prefix ? '-' + prefix : '';
  document.getElementById(`input-text${suffix}`).addEventListener('input', doFontConversion);
  document.getElementById(`input-encoding${suffix}`).addEventListener('change', updateInputFont);
  document.getElementById(`output-encoding${suffix}`).addEventListener('change', updateOutputFont);
  document.getElementById(`font-size-input${suffix}`).addEventListener('change', function() {
    const ui = getCurrentSet();
    ui.inputText.style.fontSize = this.value + 'px';
    syncState(ui);
  });
  document.getElementById(`font-size-output${suffix}`).addEventListener('change', function() {
    const ui = getCurrentSet();
    ui.outputText.style.fontSize = this.value + 'px';
    syncState(ui);
  });
}

window.onload = function() {
  generateFontStyles();
  populateEncodingSelects();
  buildAllMappings();
  attachEvents();
  attachEvents('mobile');

  document.getElementById('input-encoding').value = 'bamini';
  document.getElementById('output-encoding').value = 'unicode';
  document.getElementById('input-encoding-mobile').value = 'bamini';
  document.getElementById('output-encoding-mobile').value = 'unicode';

  document.getElementById('font-size-input').value = '17';
  document.getElementById('font-size-output').value = '17';
  document.getElementById('font-size-input-mobile').value = '15';
  document.getElementById('font-size-output-mobile').value = '15';

  document.getElementById('input-text').style.fontSize = '17px';
  document.getElementById('output-text').style.fontSize = '17px';
  document.getElementById('input-text-mobile').style.fontSize = '15px';
  document.getElementById('output-text-mobile').style.fontSize = '15px';

  updateInputFont();
  updateOutputFont();

  window.addEventListener('resize', () => {
    const ui = getCurrentSet();
    syncState(ui);
  });
};
</script>
</body>
</html>
